const { useState, useEffect, useRef } = React;

/* ── INTERSECTION OBSERVER HOOK ── */
function useInView(threshold = 0.15) {
  const ref = useRef(null);
  const [inView, setInView] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => { if(e.isIntersecting) setInView(true); }, { threshold });
    if(ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return [ref, inView];
}

/* ── IS MOBILE HOOK ── */
function useIsMobile(breakpoint = 768) {
  const [isMobile, setIsMobile] = useState(window.innerWidth <= breakpoint);
  useEffect(() => {
    const fn = () => setIsMobile(window.innerWidth <= breakpoint);
    window.addEventListener('resize', fn);
    return () => window.removeEventListener('resize', fn);
  }, [breakpoint]);
  return isMobile;
}

/* ── ANIMATED COUNTER ── */
function Counter({ end, prefix="", suffix="" }) {
  const [val, setVal] = useState(0);
  const [ref, inView] = useInView();
  useEffect(() => {
    if(!inView) return;
    let cur = 0; const steps = 50; const inc = end/steps;
    const t = setInterval(() => { cur += inc; if(cur >= end){ setVal(end); clearInterval(t); } else setVal(Math.floor(cur)); }, 30);
    return () => clearInterval(t);
  }, [inView, end]);
  return <span ref={ref}>{prefix}{val.toLocaleString()}{suffix}</span>;
}

function PageRouter({ page, C, isMobile }) {
  switch(page) {
    case 'Overview':        return <OverviewPage C={C} isMobile={isMobile}/>;
    case 'Users':           return <UsersPage C={C} isMobile={isMobile}/>;
    case 'Transactions':    return <TransactionsPage C={C} isMobile={isMobile}/>;
    case 'NOWPayments':     return <NOWPaymentsPage C={C} isMobile={isMobile}/>;
    case 'Profits':         return <ProfitsPage C={C} isMobile={isMobile}/>;
    case 'Products':        return <ProductsPage C={C} isMobile={isMobile}/>;
    case 'Profile Changes': return <ProfileChangesPage C={C} isMobile={isMobile}/>;
    case 'Support':         return <SupportPage C={C} isMobile={isMobile}/>;
    default:                return <OverviewPage C={C} isMobile={isMobile}/>;
  }
}

function Tabs({ tabs, active, setActive, C }) {

function Spinner() {

function useRefresh(initialData, delay=800) {
  const [data, setData] = useState(initialData);
  const [loading, setLoading] = useState(false);
  const [lastRefresh, setLastRefresh] = useState(new Date());
  const refresh = () => {
    setLoading(true);
    setTimeout(() => { setLoading(false); setLastRefresh(new Date()); }, delay);

function Pagination({ page, total, perPage, setPage, C }) {

function SignupModal({ onClose, onSwitchToLogin }) {

/* ── APP ── */
function App() {
  const [active, setActive] = useState('Hero');
  const [showLogin, setShowLogin] = useState(false);
  const [showSignup, setShowSignup] = useState(false);
  const [isAdmin, setIsAdmin] = useState(false);
  if (isAdmin) return <AdminDashboard onLogout={() => setIsAdmin(false)}/>;
  return (
    <>
      {showLogin && <LoginModal onClose={() => setShowLogin(false)} onSwitchToSignup={() => { setShowLogin(false); setShowSignup(true); }} onAdminLogin={() => setIsAdmin(true)}/>}
      {showSignup && <SignupModal onClose={() => setShowSignup(false)} onSwitchToLogin={() => { setShowSignup(false); setShowLogin(true); }}/>}
      <Navbar active={active} setActive={setActive} onLoginClick={() => setShowLogin(true)}/>
      <Hero setActive={setActive}/>
      <HowItWorks/>
      <Plans/>
      <About/>

      <FAQ/>
      <CTA/>
      <Contacts/>
      <Footer setActive={setActive}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
