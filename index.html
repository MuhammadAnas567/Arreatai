<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Arreatai — Strategically Managed Digital Assets</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Satoshi:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}

/* ── THEME VARIABLES ── */
:root{
  --bg:#FFFBEB;--bg2:#FEF9E7;--bg3:#FEF3C7;
  --sidebar:#0F172A;--topbar:#fff;--card:#fff;
  --border:#FEF3C7;--border2:#FDE68A;--borderC:#E2E8F0;
  --gold:#D4AF37;--goldL:#FACC15;--goldD:rgba(212,175,55,0.12);--goldD2:rgba(212,175,55,0.22);
  --blue:#1D4ED8;--blueM:#3B82F6;--blueD:rgba(29,78,216,0.08);--blueD2:rgba(29,78,216,0.15);
  --green:#22C55E;--greenD:rgba(34,197,94,0.1);
  --red:#EF4444;--redD:rgba(239,68,68,0.08);
  --amber:#F59E0B;--amberD:rgba(245,158,11,0.09);
  --info:#3B82F6;--infoD:rgba(59,130,246,0.09);
  --text:#0F172A;--text2:#475569;--text3:#94A3B8;--muted:#CBD5E1;
  --shadow:0 2px 6px rgba(0,0,0,0.05);--shadowM:0 4px 16px rgba(0,0,0,0.08);
  --accent:#a8ff3e;--accentD:rgba(168,255,62,0.1);--accentD2:rgba(168,255,62,0.18);
  --radius:12px;--radiusSm:8px;--radiusLg:16px;
}
[data-theme="dark"]{
  --bg:#0f1117;--bg2:#161b24;--bg3:#1c2333;
  --topbar:#161b24;--card:#161b24;
  --border:rgba(255,255,255,0.07);--border2:rgba(212,175,55,0.25);--borderC:rgba(255,255,255,0.1);
  --blueD:rgba(29,78,216,0.18);--blueD2:rgba(29,78,216,0.28);
  --greenD:rgba(34,197,94,0.15);--redD:rgba(239,68,68,0.15);
  --amberD:rgba(245,158,11,0.15);--infoD:rgba(59,130,246,0.15);
  --goldD:rgba(212,175,55,0.18);--goldD2:rgba(212,175,55,0.28);
  --text:#F1F5F9;--text2:#94A3B8;--text3:#475569;--muted:#334155;
  --shadow:0 2px 8px rgba(0,0,0,0.3);--shadowM:0 4px 20px rgba(0,0,0,0.4);
}

body{font-family:'Satoshi',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;}
::selection{background:var(--gold);color:#0F172A;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes shimmer{0%{background-position:-400px 0;}100%{background-position:400px 0;}}
@keyframes slideDown{from{opacity:0;max-height:0;transform:translateY(-8px);}to{opacity:1;max-height:400px;transform:translateY(0);}}
@keyframes toastIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}

/* ── WEBSITE GLOBAL ── */
.hero-section{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:90px 6% 60px;position:relative;overflow:hidden;}
.dot-grid{position:absolute;inset:0;background-image:radial-gradient(circle,rgba(212,175,55,0.06) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;}
[data-theme="dark"] .dot-grid{background-image:radial-gradient(circle,rgba(212,175,55,0.04) 1px,transparent 1px);}
.section-pad{padding:100px 6%;}
.max-w{max-width:1200px;margin:0 auto;}
.max-w-sm{max-width:800px;margin:0 auto;}

/* ── BUTTONS (website) ── */
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--goldL));color:#0F172A;border:none;border-radius:12px;padding:14px 36px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Satoshi',sans-serif;letter-spacing:1.5px;box-shadow:0 8px 32px rgba(212,175,55,0.35);transition:all 0.22s;}
.btn-gold:hover{transform:translateY(-3px);box-shadow:0 14px 44px rgba(212,175,55,0.5);}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border2);border-radius:12px;padding:14px 30px;font-size:14px;font-weight:500;cursor:pointer;font-family:'Satoshi',sans-serif;transition:all 0.2s;}
.btn-outline:hover{background:var(--goldD);}
.btn-blue{background:var(--blue);color:#fff;border:none;border-radius:var(--radiusSm);padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Satoshi',sans-serif;transition:all 0.15s;}
.btn-blue:hover{background:var(--blueM);transform:translateY(-1px);}
.btn-sm-gold{background:linear-gradient(135deg,var(--gold),var(--goldL));color:#0F172A;border:none;border-radius:var(--radiusSm);padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Satoshi',sans-serif;box-shadow:0 2px 8px rgba(212,175,55,0.3);transition:all 0.15s;}
.btn-sm-gold:hover{box-shadow:0 4px 14px rgba(212,175,55,0.5);transform:translateY(-1px);}
.btn-sm-outline{background:transparent;color:var(--text2);border:1px solid var(--borderC);border-radius:var(--radiusSm);padding:7px 13px;font-size:12px;cursor:pointer;font-family:'Satoshi',sans-serif;transition:all 0.14s;}
.btn-sm-outline:hover{background:var(--bg);}
.btn-danger{background:var(--redD);color:var(--red);border:1px solid rgba(239,68,68,0.22);border-radius:var(--radiusSm);padding:7px 16px;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.14s;}
.btn-danger:hover{background:rgba(239,68,68,0.18);}
.btn-success{background:var(--greenD);color:var(--green);border:1px solid rgba(34,197,94,0.22);border-radius:var(--radiusSm);padding:7px 16px;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.14s;}
.btn-success:hover{background:rgba(34,197,94,0.18);}

/* ── ADMIN CARD ── */
.a-card{background:var(--card);border:1px solid var(--borderC);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);transition:all 0.2s;}
[data-theme="dark"] .a-card{border-color:var(--border);}

/* ── ADMIN TABLES ── */
.a-table{width:100%;border-collapse:collapse;}
.a-table th{padding:10px 14px;text-align:left;font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;font-weight:600;white-space:nowrap;background:var(--bg);}
[data-theme="dark"] .a-table th{background:var(--bg2);}
.a-table td{padding:11px 14px;border-top:1px solid var(--border);font-size:13px;color:var(--text2);}
.a-table tr:hover td{background:var(--bg);}
[data-theme="dark"] .a-table tr:hover td{background:var(--bg2);}
.t-wrap{overflow-x:auto;}

/* ── BADGE ── */
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap;border:1px solid transparent;}

/* ── INPUT ── */
.a-input{width:100%;background:var(--bg);border:1px solid var(--borderC);border-radius:var(--radiusSm);padding:9px 12px;color:var(--text);font-size:13px;outline:none;font-family:'Satoshi',sans-serif;transition:border-color 0.18s;}
.a-input:focus{border-color:var(--gold);}
[data-theme="dark"] .a-input{background:var(--bg3);}
.a-select{background:var(--card);border:1px solid var(--borderC);border-radius:var(--radiusSm);padding:8px 12px;font-size:13px;color:var(--text);outline:none;cursor:pointer;font-family:'Satoshi',sans-serif;}
[data-theme="dark"] .a-select{background:var(--bg2);}
.search-wrap{position:relative;}
.search-wrap input{padding-left:34px;}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;}
.a-textarea{width:100%;background:var(--bg);border:1px solid var(--borderC);border-radius:var(--radiusSm);padding:10px 14px;color:var(--text);font-size:13px;outline:none;resize:none;font-family:'Satoshi',sans-serif;transition:border-color 0.18s;}
.a-textarea:focus{border-color:var(--gold);}
[data-theme="dark"] .a-textarea{background:var(--bg3);}

/* ── SIDEBAR ── */
.sidebar{background:var(--sidebar);display:flex;flex-direction:column;transition:width 0.25s ease;overflow:hidden;flex-shrink:0;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;cursor:pointer;margin-bottom:2px;font-size:13px;transition:all 0.14s;border-left:3px solid transparent;color:rgba(255,255,255,0.5);font-weight:400;}
.nav-item.active{background:rgba(212,175,55,0.15);border-left-color:var(--gold);color:var(--goldL);font-weight:600;}
.nav-item:not(.active):hover{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.85);}
.nav-item.collapsed{justify-content:center;padding:11px;}

/* ── TABS ── */
.tabs{display:flex;gap:2px;background:var(--bg3);border-radius:10px;padding:4px;border:1px solid var(--border);width:fit-content;flex-wrap:wrap;}
[data-theme="dark"] .tabs{background:var(--bg2);}
.tab-btn{padding:7px 14px;border-radius:7px;border:none;cursor:pointer;font-size:12px;background:transparent;color:var(--text2);font-family:'Satoshi',sans-serif;transition:all 0.14s;white-space:nowrap;}
.tab-btn.active{background:var(--card);color:var(--gold);font-weight:700;box-shadow:var(--shadow);}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;z-index:9999;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:var(--shadowM);animation:toastIn 0.3s ease;max-width:280px;}
@media(max-width:600px){.toast{right:12px;left:12px;bottom:16px;text-align:center;}}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,0.65);z-index:8000;display:flex;align-items:flex-start;justify-content:center;padding:24px 16px;overflow-y:auto;backdrop-filter:blur(4px);animation:fadeIn 0.2s;}
.modal-box{background:var(--card);border:1px solid var(--borderC);border-radius:var(--radiusLg);padding:28px;width:100%;max-width:520px;box-shadow:0 20px 60px rgba(0,0,0,0.25);animation:fadeUp 0.25s ease;margin:auto;}
[data-theme="dark"] .modal-box{border-color:var(--border);}

/* ── STATUS COLORS ── */
.s-active{color:var(--green);background:var(--greenD);border-color:rgba(34,197,94,0.22)!important;}
.s-inactive{color:var(--text2);background:rgba(148,163,184,0.1);border-color:rgba(148,163,184,0.2)!important;}
.s-pending{color:var(--amber);background:var(--amberD);border-color:rgba(245,158,11,0.22)!important;}
.s-archived,.s-failed{color:var(--red);background:var(--redD);border-color:rgba(239,68,68,0.22)!important;}
.s-approved,.s-finished,.s-completed,.s-resolved,.s-yes{color:var(--green);background:var(--greenD);border-color:rgba(34,197,94,0.22)!important;}
.s-waiting,.s-open,.s-in-progress{color:var(--amber);background:var(--amberD);border-color:rgba(245,158,11,0.22)!important;}
.s-closed{color:var(--text2);background:rgba(148,163,184,0.1);border-color:rgba(148,163,184,0.2)!important;}
.s-deposit{color:var(--green);background:var(--greenD);border-color:rgba(34,197,94,0.22)!important;}
.s-withdrawal{color:var(--red);background:var(--redD);border-color:rgba(239,68,68,0.22)!important;}
.s-profit,.s-commission{color:var(--info);background:var(--infoD);border-color:rgba(59,130,246,0.22)!important;}
.ref-code{color:#DC2626;background:rgba(220,38,38,0.08);border:1px solid rgba(220,38,38,0.18);padding:3px 9px;border-radius:6px;font-family:'Clash Display',sans-serif;font-size:11px;font-weight:700;}

/* ── ADMIN LAYOUT ── */
.admin-wrap{display:flex;height:100vh;overflow:hidden;}
.admin-main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.admin-topbar{height:62px;background:var(--topbar);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;box-shadow:var(--shadow);}
.admin-content{flex:1;overflow-y:auto;padding:22px 24px;background:var(--bg);}
.topbar-ticker{display:flex;gap:14px;align-items:center;padding-right:16px;border-right:1px solid var(--border);margin-right:4px;}
.mobile-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,0.55);z-index:199;backdrop-filter:blur(2px);}

/* ── WEBSITE NAV ── */
.site-nav{position:fixed;top:0;left:0;right:0;z-index:999;height:68px;display:flex;align-items:center;padding:0 6%;gap:36px;transition:all 0.35s ease;}
.site-nav.scrolled{background:var(--card);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);box-shadow:var(--shadow);}
.nav-link{background:none;border:none;cursor:pointer;padding:8px 14px;border-radius:8px;font-family:'Satoshi',sans-serif;font-size:14px;font-weight:500;color:var(--text2);transition:color 0.2s;}
.nav-link:hover,.nav-link.active{color:var(--text);}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .sidebar{position:fixed!important;top:0;left:0;bottom:0;z-index:200!important;transform:translateX(-100%);transition:transform 0.28s ease!important;box-shadow:4px 0 24px rgba(0,0,0,0.2)!important;}
  .sidebar.open{transform:translateX(0)!important;}
  .mobile-overlay{display:block;}
  .admin-content{padding:14px!important;}
  .topbar-ticker{display:none!important;}
  .grid-4{grid-template-columns:1fr 1fr!important;}
  .grid-3,.grid-2,.grid-2c{grid-template-columns:1fr!important;}
  .support-grid{grid-template-columns:1fr!important;height:auto!important;}
  .hide-mob{display:none!important;}
  .a-table th:nth-child(n+5),.a-table td:nth-child(n+5){display:none!important;}
  .page-hdr{flex-wrap:wrap;gap:8px!important;}
  .filter-bar{flex-wrap:wrap!important;}
  .section-pad{padding:60px 5%!important;}
  .hero-section{padding:80px 5% 50px!important;}
  .stats-strip{grid-template-columns:1fr!important;}
  .plans-grid{grid-template-columns:1fr!important;}
  .two-col{grid-template-columns:1fr!important;}
}
@media(max-width:480px){
  .grid-4{grid-template-columns:1fr!important;}
  .tabs{flex-wrap:wrap;}
  .modal-box{padding:20px 16px;}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

/* ════════════════════════
   GLOBAL HELPERS
════════════════════════ */
function useTheme(){
  const[dark,setDark]=useState(()=>localStorage.getItem('arreatai-theme')==='dark');
  useEffect(()=>{
    document.documentElement.setAttribute('data-theme',dark?'dark':'light');
    localStorage.setItem('arreatai-theme',dark?'dark':'light');
  },[dark]);
  return[dark,()=>setDark(d=>!d)];
}
function useMobile(){
  const[m,setM]=useState(window.innerWidth<=768);
  useEffect(()=>{const h=()=>setM(window.innerWidth<=768);window.addEventListener('resize',h);return()=>window.removeEventListener('resize',h);},[]);
  return m;
}
function useInView(t=0.12){
  const ref=useRef(null);const[v,setV]=useState(false);
  useEffect(()=>{const o=new IntersectionObserver(([e])=>{if(e.isIntersecting)setV(true);},{threshold:t});if(ref.current)o.observe(ref.current);return()=>o.disconnect();},[]);
  return[ref,v];
}
function useCounter(end,active,dur=1200){
  const[val,setVal]=useState(0);
  useEffect(()=>{if(!active)return;const s=Date.now();const tick=()=>{const p=Math.min((Date.now()-s)/dur,1);const e=1-Math.pow(1-p,3);setVal(Math.floor(e*end));if(p<1)requestAnimationFrame(tick);else setVal(end);};requestAnimationFrame(tick);},[active,end]);
  return val;
}

/* ── TOAST ── */
function Toast({msg,type}){
  const bg={success:'var(--green)',error:'var(--red)',gold:'linear-gradient(135deg,var(--gold),var(--goldL))'}[type]||'var(--gold)';
  const col=type==='gold'?'#0F172A':'#fff';
  if(!msg)return null;
  return <div className="toast" style={{background:bg,color:col}}>{msg}</div>;
}
function useToast(){
  const[t,setT]=useState({});
  const show=(msg,type='success')=>{setT({msg,type});setTimeout(()=>setT({}),2600);};
  return[t,show];
}

/* ── MODAL ── */
function Modal({open,onClose,title,children,width=520}){
  useEffect(()=>{if(open)document.body.style.overflow='hidden';return()=>{document.body.style.overflow='';};},[open]);
  if(!open)return null;
  return(
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-box" style={{maxWidth:width}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
          <span style={{fontFamily:"'Clash Display',sans-serif",fontSize:17,fontWeight:700,color:'var(--text)'}}>{title}</span>
          <button onClick={onClose} className="btn-sm-outline" style={{width:30,height:30,padding:0,display:'flex',alignItems:'center',justifyContent:'center',borderRadius:7}}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

/* ── BADGE ── */
function Bdg({label,cls}){
  const map={'ACTIVE':'s-active','INACTIVE':'s-inactive','PENDING':'s-pending','APPROVED':'s-approved',
    'ARCHIVED':'s-archived','FAILED':'s-failed','COMPLETED':'s-completed','RESOLVED':'s-resolved',
    'DEPOSIT':'s-deposit','WITHDRAWAL':'s-withdrawal','PROFIT':'s-profit','COMMISSION':'s-commission',
    'finished':'s-finished','waiting':'s-waiting','open':'s-open','closed':'s-closed','in-progress':'s-in-progress',
    'Yes':'s-yes','No':'s-archived','Active':'s-active','Inactive':'s-inactive',
    'Weekly profit':'s-profit','Monthly profit':'s-deposit','Compounding growth':'s-pending',};
  return <span className={`badge ${cls||map[label]||''}`}>{label}</span>;
}

/* ── SPINNER ── */
function Spin(){
  const[r,setR]=useState(0);
  useEffect(()=>{const t=setInterval(()=>setR(v=>(v+18)%360),30);return()=>clearInterval(t);},[]);
  return<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" style={{transform:`rotate(${r}deg)`,display:'inline-block'}}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>;
}

/* ── PAGINATION ── */
function Pager({page,total,per,setPage}){
  const pages=Math.ceil(total/per);if(pages<=1)return null;
  return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 16px',borderTop:'1px solid var(--border)'}}>
      <span style={{fontSize:12,color:'var(--text3)'}}>Showing {Math.min((page-1)*per+1,total)}–{Math.min(page*per,total)} of {total.toLocaleString()}</span>
      <div style={{display:'flex',gap:5}}>
        <button onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={page===1} className="btn-sm-outline" style={{padding:'5px 12px',fontSize:11,opacity:page===1?0.4:1}}>← Prev</button>
        {[...Array(Math.min(5,pages))].map((_,i)=>{const p=Math.max(1,Math.min(page-2,pages-4))+i;return(
          <button key={p} onClick={()=>setPage(p)} style={{width:30,height:30,borderRadius:7,border:`1px solid ${p===page?'var(--gold)':'var(--borderC)'}`,background:p===page?'var(--goldD)':'transparent',color:p===page?'var(--gold)':'var(--text2)',cursor:'pointer',fontSize:12,fontWeight:p===page?700:400}}>{p}</button>
        );})}
        <button onClick={()=>setPage(p=>Math.min(pages,p+1))} disabled={page===pages} className="btn-sm-outline" style={{padding:'5px 12px',fontSize:11,opacity:page===pages?0.4:1}}>Next →</button>
      </div>
    </div>
  );
}

/* ── SEARCH BOX ── */
function SBox({value,onChange,placeholder,style={}}){
  return(
    <div className="search-wrap" style={style}>
      <svg className="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input className="a-input" value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}/>
    </div>
  );
}

/* ── EYE / EDIT BUTTONS ── */
function EBtn({onClick}){return<button onClick={onClick} style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:7,width:30,height:30,cursor:'pointer',display:'inline-flex',alignItems:'center',justifyContent:'center',color:'var(--text3)',transition:'all 0.14s'}} onMouseEnter={e=>{e.currentTarget.style.background='var(--goldD)';e.currentTarget.style.color='var(--gold)';}} onMouseLeave={e=>{e.currentTarget.style.background='var(--bg)';e.currentTarget.style.color='var(--text3)';}}>
  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
</button>;}

/* ── PAGE ROUTER ── */
function PageRouter({page,isMob}){
  switch(page){
    case 'Overview':return<OverviewPage isMob={isMob}/>;
    case 'Users':return<UsersPage isMob={isMob}/>;
    case 'Transactions':return<TransactionsPage isMob={isMob}/>;
    case 'NOWPayments':return<NOWPaymentsPage isMob={isMob}/>;
    case 'Profits':return<ProfitsPage isMob={isMob}/>;
    case 'Products':return<ProductsPage isMob={isMob}/>;
    case 'Profile Changes':return<ProfileChangesPage isMob={isMob}/>;
    case 'Support':return<SupportPage isMob={isMob}/>;
    default:return<OverviewPage isMob={isMob}/>;
  }
}

/* ── MINI BAR CHART ── */
function BarChart({data,color='var(--gold)',height=100}){
  const[hov,setHov]=useState(null);
  const max=Math.max(...data.map(d=>d.v));
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return(
    <div>
      <div style={{display:'flex',alignItems:'flex-end',gap:5,height}}>
        {data.map((d,i)=>(
          <div key={i} onMouseEnter={()=>setHov(i)} onMouseLeave={()=>setHov(null)}
            style={{flex:1,height:`${(d.v/max)*100}%`,borderRadius:'4px 4px 0 0',background:hov===i||i===data.length-1?color:`${color}28`,transition:'all 0.18s',cursor:'pointer',boxShadow:i===data.length-1?`0 4px 12px ${color}40`:'none',position:'relative'}}>
            {hov===i&&<div style={{position:'absolute',bottom:'calc(100% + 4px)',left:'50%',transform:'translateX(-50%)',background:'var(--sidebar)',color:'var(--goldL)',fontSize:10,padding:'3px 7px',borderRadius:5,whiteSpace:'nowrap',zIndex:10}}>{d.label||`$${(d.v/1e6).toFixed(1)}M`}</div>}
          </div>
        ))}
      </div>
      <div style={{display:'flex',justifyContent:'space-between',marginTop:6}}>
        {data.map((d,i)=><span key={i} style={{flex:1,textAlign:'center',fontSize:9,color:'var(--text3)'}}>{months[i]}</span>)}
      </div>
    </div>
  );
}

              {c.reason&&c.reason!=='-'&&<div style={{background:'var(--amberD)',border:'1px solid rgba(245,158,11,0.22)',borderRadius:8,padding:'10px 14px',fontSize:12,color:'var(--text2)',lineHeight:1.6,marginBottom:12}}><span style={{fontWeight:600,color:'var(--amber)'}}>Reason: </span>{c.reason}</div>}
              {c.status==='Pending'&&<div style={{display:'flex',gap:8}}>
                <button className="btn-success" style={{padding:'7px 18px',fontSize:12}} onClick={()=>approve(c.id)}>✓ Approve</button>
                <button className="btn-danger" style={{padding:'7px 18px',fontSize:12}} onClick={()=>reject(c.id)}>✕ Reject</button>
                <button className="btn-sm-outline" style={{fontSize:12}}>👁 View Details</button>
              </div>}
            </div>
          ))}
        </div>
      }
    </div>
  );
}

/* ════════════════════════
   SUPPORT PAGE
════════════════════════ */
function SupportPage({isMob}){
  const[tickets,setTickets]=useState([
    {id:'#TKT-002372',subject:'deposit',user:'Stefanie Berner-Uden',email:'stefanie.berner.sb@gmail.com',date:'25/03/2026, 15:55',status:'closed',priority:'urgent',msg:'Hi, I made a deposit but it has not been credited yet. Please help!'},
    {id:'#TKT-002371',subject:'attribution',user:'Christian Farioli',email:'christian@esd.me',date:'25/03/2026, 16:22',status:'closed',priority:'medium',msg:'I have a question about how referral attribution works for my account.'},
    {id:'#TKT-002370',subject:'Betrifft Aufzahlung',user:'Renate Schmitz',email:'krypto.renate@web.de',date:'25/03/2026, 15:54',status:'open',priority:'high',msg:'Betrifft Aufzahlung meines Kontos - bitte um schnelle Hilfe.'},
    {id:'#TKT-002369',subject:'Withdrawal help',user:'Viktor Petrov',email:'viktor.petrov@mail.ru',date:'25/03/2026, 14:30',status:'in-progress',priority:'medium',msg:'I submitted a withdrawal request 3 days ago and have not received the funds yet.'},
    {id:'#TKT-002368',subject:'KYC document',user:'Anna Müller',email:'anna.mueller@gmail.com',date:'25/03/2026, 13:10',status:'resolved',priority:'low',msg:'My KYC document was rejected. What should I resubmit?'},
    {id:'#TKT-002367',subject:'Login issue',user:'Peter Schmidt',email:'peter.s@yahoo.de',date:'24/03/2026, 11:00',status:'open',priority:'high',msg:'I cannot login to my account since yesterday. Please help urgently.'},
  ]);
  const[sel,setSel]=useState(null);
  const[statF,setStatF]=useState('All Status');
  const[prioF,setPrioF]=useState('All Priority');
  const[search,setSearch]=useState('');
  const[reply,setReply]=useState('');
  const[replies,setReplies]=useState({});
  const[loading,setLoading]=useState(false);
  const[mobShowDetail,setMobShowDetail]=useState(false);
  const[toast,showToast]=useToast();

  const stColor={'open':'var(--blue)','in-progress':'var(--amber)','resolved':'var(--green)','closed':'var(--text3)'};
  const stCls={'open':'s-open','in-progress':'s-in-progress','resolved':'s-resolved','closed':'s-closed'};
  const prioColor={'urgent':'var(--red)','high':'var(--amber)','medium':'var(--blue)','low':'var(--text3)'};
  const prioCls={'urgent':'s-failed','high':'s-pending','medium':'s-deposit','low':'s-inactive'};

  const updateStatus=(id,ns)=>{
    setTickets(ts=>ts.map(t=>t.id===id?{...t,status:ns}:t));
    if(sel?.id===id)setSel(s=>({...s,status:ns}));
    showToast(`Ticket ${ns}!`,ns==='resolved'?'success':ns==='closed'?'error':'gold');
  };
  const sendReply=()=>{
    if(!reply.trim())return;
    setReplies(r=>({...r,[sel.id]:[...(r[sel.id]||[]),{text:reply,time:new Date().toLocaleTimeString()}]}));
    setReply('');showToast('Reply sent!','success');
  };
  const filtered=tickets.filter(t=>{
    const sm=statF==='All Status'||t.status===statF.toLowerCase().replace(' ','-');
    const pm=prioF==='All Priority'||t.priority===prioF.toLowerCase();
    const qm=!search||(t.id+t.user+t.subject).toLowerCase().includes(search.toLowerCase());
    return sm&&pm&&qm;
  });
  const stats=[
    {l:'Total',v:tickets.length,c:'var(--text)'},{l:'Open',v:tickets.filter(t=>t.status==='open').length,c:'var(--blue)'},
    {l:'In Progress',v:tickets.filter(t=>t.status==='in-progress').length,c:'var(--amber)'},{l:'Resolved',v:tickets.filter(t=>t.status==='resolved').length,c:'var(--green)'},{l:'Closed',v:tickets.filter(t=>t.status==='closed').length,c:'var(--text3)'},
  ];

  const selectTicket=(t)=>{setSel(t);if(isMob)setMobShowDetail(true);};

  return(
    <div>
      <Toast msg={toast.msg} type={toast.type}/>
      <SHdr title="Support System">
        <button className="btn-blue">Weekly Stats</button>
      </SHdr>

      {/* Stats pills */}
      <div style={{display:'flex',gap:8,marginBottom:18,flexWrap:'wrap'}}>
        {stats.map((s,i)=>(
          <div key={i} style={{padding:'6px 16px',borderRadius:20,background:'var(--card)',border:'1px solid var(--borderC)',boxShadow:'var(--shadow)',display:'flex',gap:6,alignItems:'center'}}>
            <span style={{fontSize:12,color:'var(--text2)'}}>{s.l}:</span>
            <span style={{fontFamily:"'Clash Display',sans-serif",fontSize:14,fontWeight:700,color:s.c}}>{s.v}</span>
          </div>
        ))}
      </div>

      <div style={{display:'grid',gridTemplateColumns:isMob?'1fr':'360px 1fr',gap:14,height:isMob?'auto':'calc(100vh - 300px)',minHeight:450}}>
        {/* Left panel */}
        {(!isMob||!mobShowDetail)&&(
          <div className="a-card" style={{padding:0,overflow:'hidden',display:'flex',flexDirection:'column'}}>
            <div style={{padding:'12px 14px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <span style={{fontFamily:"'Clash Display',sans-serif",fontSize:14,fontWeight:700,color:'var(--text)'}}>Support Tickets</span>
              <button className="btn-sm-gold" style={{display:'flex',alignItems:'center',gap:4,fontSize:11}} onClick={()=>{setLoading(true);setTimeout(()=>{setLoading(false);showToast('Refreshed!','gold');},800);}}>{loading?<Spin/>:'↻'}</button>
            </div>
            <div style={{padding:'9px 12px',borderBottom:'1px solid var(--border)',display:'flex',gap:6}}>
              <select value={statF} onChange={e=>setStatF(e.target.value)} className="a-select" style={{flex:1,fontSize:11,padding:'5px 8px'}}><option>All Status</option><option>open</option><option>closed</option><option>in-progress</option><option>resolved</option></select>
              <select value={prioF} onChange={e=>setPrioF(e.target.value)} className="a-select" style={{flex:1,fontSize:11,padding:'5px 8px'}}><option>All Priority</option><option>urgent</option><option>high</option><option>medium</option><option>low</option></select>
            </div>
            <SBox value={search} onChange={setSearch} placeholder="Search tickets..." style={{margin:'8px 10px'}}/>
            <div style={{flex:1,overflowY:'auto'}}>
              {filtered.length===0?<div style={{padding:'30px',textAlign:'center',color:'var(--text3)',fontSize:13}}>No tickets found.</div>
              :filtered.map(t=>(
                <div key={t.id} onClick={()=>selectTicket(t)}
                  style={{padding:'12px 14px',borderBottom:'1px solid var(--border)',cursor:'pointer',transition:'background 0.12s',background:sel?.id===t.id?'var(--goldD)':'transparent',borderLeft:sel?.id===t.id?'3px solid var(--gold)':'3px solid transparent'}}
                  onMouseEnter={e=>{if(sel?.id!==t.id)e.currentTarget.style.background='var(--bg)';}}
                  onMouseLeave={e=>{if(sel?.id!==t.id)e.currentTarget.style.background='transparent';}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                    <span style={{fontSize:12,fontWeight:700,color:'var(--blue)'}}>{t.id}</span>
                    <span style={{fontSize:11,color:'var(--text3)'}}>{t.date.split(', ')[1]||t.date}</span>
                  </div>
                  <div style={{fontSize:12,fontWeight:600,color:'var(--text)',marginBottom:2}}>{t.user}</div>
                  <div style={{fontSize:11,color:'var(--text3)',marginBottom:6}}>{t.email}</div>
                  <div style={{display:'flex',gap:5}}><Bdg label={t.status} cls={stCls[t.status]}/><Bdg label={t.priority} cls={prioCls[t.priority]}/></div>
                </div>
              ))}
            </div>
            <div style={{padding:'10px 14px',borderTop:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
              <button className="btn-sm-outline" style={{fontSize:11,padding:'5px 12px'}}>← Previous</button>
              <span style={{background:'var(--gold)',color:'#0F172A',fontSize:12,fontWeight:700,padding:'4px 12px',borderRadius:6}}>1 of 238</span>
              <button className="btn-sm-outline" style={{fontSize:11,padding:'5px 12px'}}>Next →</button>
            </div>
          </div>
        )}

        {/* Right detail */}
        {(!isMob||mobShowDetail)&&(
          <div className="a-card" style={{display:'flex',flexDirection:'column',overflow:'hidden'}}>
            {isMob&&mobShowDetail&&<button className="btn-sm-outline" style={{alignSelf:'flex-start',marginBottom:12,fontSize:12}} onClick={()=>setMobShowDetail(false)}>← Back to list</button>}
            {!sel?(
              <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
                <div style={{width:72,height:72,borderRadius:'50%',background:'var(--bg)',border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:14}}>
                  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" strokeWidth="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                </div>
                <div style={{fontFamily:"'Clash Display',sans-serif",fontSize:16,fontWeight:700,color:'var(--text)',marginBottom:6}}>Select a Ticket</div>
                <div style={{fontSize:13,color:'var(--text3)',textAlign:'center'}}>Choose a support ticket from the list to view details and manage it</div>
              </div>
            ):(
              <div style={{display:'flex',flexDirection:'column',height:'100%',gap:12}}>
                <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',paddingBottom:12,borderBottom:'1px solid var(--border)',flexWrap:'wrap',gap:8}}>
                  <div>
                    <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:4}}>
                      <span style={{fontFamily:"'Clash Display',sans-serif",fontSize:14,fontWeight:700,color:'var(--blue)'}}>{sel.id}</span>
                      <span style={{fontSize:14,fontWeight:600,color:'var(--text)'}}>{sel.subject}</span>
                    </div>
                    <div style={{fontSize:13,color:'var(--text2)'}}>{sel.user} · <span style={{color:'var(--text3)'}}>{sel.email}</span></div>
                    <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{sel.date}</div>
                  </div>
                  <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                    <Bdg label={sel.status} cls={stCls[sel.status]}/>
                    <Bdg label={sel.priority} cls={prioCls[sel.priority]}/>
                  </div>
                </div>
                <div style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:8,padding:'13px',fontSize:13,color:'var(--text2)',lineHeight:1.75}}>{sel.msg}</div>
                {(replies[sel.id]||[]).map((r,i)=>(
                  <div key={i} style={{background:'var(--goldD)',border:'1px solid var(--border2)',borderRadius:8,padding:'10px 14px',fontSize:13,color:'var(--text)'}}>
                    <div style={{fontSize:10,color:'var(--text3)',marginBottom:4}}>Admin reply · {r.time}</div>{r.text}
                  </div>
                ))}
                {sel.status!=='closed'?(
                  <div style={{marginTop:'auto'}}>
                    <textarea value={reply} onChange={e=>setReply(e.target.value)} placeholder="Type your reply..." rows={3} className="a-textarea" style={{marginBottom:10}}/>
                    <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                      <button className="btn-blue" style={{display:'flex',alignItems:'center',gap:5}} onClick={sendReply}>
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>Send Reply
                      </button>
                      {sel.status!=='resolved'&&<button className="btn-success" style={{fontSize:12}} onClick={()=>updateStatus(sel.id,'resolved')}>✓ Resolve</button>}
                      {sel.status!=='in-progress'&&<button className="btn-sm-gold" style={{fontSize:12}} onClick={()=>updateStatus(sel.id,'in-progress')}>⚡ In Progress</button>}
                      <button className="btn-danger" style={{fontSize:12}} onClick={()=>updateStatus(sel.id,'closed')}>✕ Close</button>
                    </div>
                  </div>
                ):<div style={{textAlign:'center',padding:'16px',color:'var(--text3)',fontSize:13}}>This ticket is closed. No further actions available.</div>}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

/* ════════════════════════
   MAIN APP
════════════════════════ */
function App(){
  const[dark,toggleDark]=useTheme();
  const[showLogin,setShowLogin]=useState(false);
  const[showSignup,setShowSignup]=useState(false);
  const[isAdmin,setIsAdmin]=useState(false);

  if(isAdmin)return<AdminDashboard onLogout={()=>setIsAdmin(false)} dark={dark} toggleDark={toggleDark}/>;

  return(
    <>
      {showLogin&&<LoginModal onClose={()=>setShowLogin(false)} onSignup={()=>{setShowLogin(false);setShowSignup(true);}} onAdminLogin={()=>{setShowLogin(false);setIsAdmin(true);}}/>}
      {showSignup&&<SignupModal onClose={()=>setShowSignup(false)} onLogin={()=>{setShowSignup(false);setShowLogin(true);}}/>}
      <SiteNav onLogin={()=>setShowLogin(true)} dark={dark} toggleDark={toggleDark}/>
      <Hero dark={dark} onLogin={()=>setShowLogin(true)}/>
      <HowItWorks/>
      <Plans/>
      <About/>
      <FAQ/>
      <CTA/>
      <Contacts/>
      <Footer toggleDark={toggleDark} dark={dark}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
